# Copy this folder to channels/<your-channel>/ and edit below.

# Post Bridge channel name (the "username" field from /v1/social-accounts).
# Case-insensitive match. You can also use the numeric account id.
social_account: "MyChannelName"

# Where to look for new videos. Empty/missing = use this folder's inbox/.
source_folder: ""

# After scheduling, move files to this channel's posted/ folder.
# Set false if you want originals untouched (advanced).
move_after_post: true

# How late can a slot fire before we push it to the next free slot?
catch_up_window_minutes: 30

# What to do with the source file once Post Bridge confirms it's live on YouTube:
#   archive (default) - move to channels/<name>/archive/
#   trash             - move to macOS Trash (recoverable, frees disk)
#   delete            - permanent delete (frees disk immediately)
#   none              - leave file in posted/
cleanup_after_publish: archive

schedule:
  # Daily slot times in the channel timezone (24-hour).
  times: ["09:00", "18:00"]

  # Days the schedule runs on.
  days: [Mon, Tue, Wed, Thu, Fri, Sat, Sun]

  # IANA timezone (America/New_York, Europe/London, Asia/Tokyo, ...)
  timezone: "America/New_York"

youtube:
  # {smart_title} = filename with dashes turned into a Title Case sentence
  # (the video ID suffix from yt-dlp output gets stripped automatically).
  # Per-video sidecar JSON files override this. Title must be 2-100 chars.
  title_template: "{smart_title}"

  # If set, prepended to every description — first line of YouTube descriptions
  # is visible above the fold, so this acts like a pinned comment.
  pinned_message: ""

  # The rest of the description.
  description: |
    Subscribe for more!

  # ------------------------------------------------------------------
  # Optional variants: when present, watcher picks one at random per video.
  # Easiest way to populate: open the channel's Variants page in the UI,
  # copy the AI prompt, paste into ChatGPT/Claude, paste output back.
  # ------------------------------------------------------------------
  # description_variants:
  #   - "First description text..."
  #   - "Second description text..."
  # pinned_message_variants:
  #   - "👇 Earn money making videos like this 👇"
  #   - "🚀 Start your side hustle today"
  # title_template_variants:
  #   - "{smart_title} | Daily Facts"
  #   - "{smart_title} — Did You Know?"
